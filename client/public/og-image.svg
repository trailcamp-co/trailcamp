<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="mountain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0.2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#fff" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="1200" y2="420"/>
    <line x1="0" y1="210" x2="800" y2="630"/>
  </g>
  <!-- Mountains -->
  <polygon points="100,500 350,280 600,500" fill="url(#mountain)" opacity="0.3"/>
  <polygon points="350,500 600,220 850,500" fill="url(#mountain)" opacity="0.5"/>
  <polygon points="600,500 850,260 1100,500" fill="url(#mountain)" opacity="0.35"/>
  <!-- Trail line -->
  <path d="M 150 480 Q 350 350 500 400 T 750 360 T 1050 420" fill="none" stroke="#f97316" stroke-width="3" stroke-dasharray="8,6" opacity="0.6"/>
  <!-- TrailCamp text -->
  <text x="600" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="96" font-weight="800" fill="white" letter-spacing="-2">
    Trail<tspan fill="#f97316">Camp</tspan>
  </text>
  <!-- Tagline -->
  <text x="600" y="350" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="400" fill="#9ca3af" letter-spacing="1">
    Every Outdoor Adventure, One App
  </text>
  <!-- Bottom accent line -->
  <rect x="480" y="380" width="240" height="3" rx="1.5" fill="#f97316" opacity="0.6"/>
</svg>
